name: "matrix-ticket-system-dev"

services:
  postgres:
    restart: unless-stopped
    networks: [ net-matrix-ticket-system ]
    # set shared memory limit when using docker-compose
    shm_size: 128mb
    volumes:
      - postgres-vol:/var/lib/postgresql/data/
    env_file: [ .env ]
    build:
      dockerfile: ./build/dockerfiles/postgres.Dockerfile

  frontend:
    restart: unless-stopped
    networks: [ net-matrix-ticket-system ]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file: [ .env ]
    user: "${UID}:${GID}"
    build:
      dockerfile: ./build/dockerfiles/frontend-dev.Dockerfile

  webserver:
    labels:
      - webserver
    restart: unless-stopped
    depends_on: [ postgres ]
    networks: [ net-matrix-ticket-system ]
    stop_signal: SIGTERM
    volumes:
      - ./webserver/migrations:/migrations
    env_file: [ .env ]
    environment:
      - RUST_LOG=${RUST_LOG-info,webserver=debug}
    user: "${UID}:${GID}"
    build:
      dockerfile: ./build/dockerfiles/webserver-dev.Dockerfile

  nginx:
    restart: unless-stopped
    ports:
      - "8443:443"
    depends_on: [ webserver, frontend ]
    networks: [ net-matrix-ticket-system ]
    env_file: [ .env ]
    volumes:
      - ./data/conf/nginx-dev/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./data/conf/nginx-dev/matrix.crt:/certs/nginx.crt
      - ./data/conf/nginx-dev/matrix.key:/certs/nginx.key
    build:
      dockerfile: ./build/dockerfiles/nginx-dev.Dockerfile

  jaeger-dev:
    restart: unless-stopped
    env_file: [ .env ]
    networks: [ net-matrix-ticket-system ]
    ports:
      - "127.0.0.1:16686:16686"
    build:
      dockerfile: build/dockerfiles/jaeger-dev.Dockerfile

volumes:
  postgres-vol:
    name: ${COMPOSE_PROJECT_NAME}-postgres-vol-${DEV_TAG}

networks:
  net-matrix-ticket-system:
    driver: bridge